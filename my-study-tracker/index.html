<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="my-study-tracker">
  <title>my-study-tracker</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <span class="header-logo">my-study-tracker</span>
        <button class="header-sem-trigger" id="header-sem-trigger" aria-label="学期切り替え">
          <span id="header-semester">読み込み中...</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="10" height="10" style="margin-left:3px;flex-shrink:0"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
      </div>
      <div class="header-right">
        <button class="header-settings-btn" id="header-settings-btn" aria-label="設定">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- 学期ドロワー -->
  <div id="sem-overlay" style="display:none;position:fixed;inset:0;z-index:290" onclick="closeSemDrawer()"></div>
  <div id="sem-drawer" style="display:none;position:fixed;z-index:300;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px;min-width:190px;box-shadow:0 8px 32px rgba(0,0,0,0.5)">
    <div id="sem-drawer-list"></div>
  </div>

  <main class="main">

    <!-- ===== 今日タブ ===== -->
    <div class="page active" id="page-today">
      <div id="today-exam-alerts"></div>
      <div id="today-alerts"></div>

      <div class="card">
        <div class="card-label">TODAY</div>
        <div class="card-title" id="today-date"></div>
        <div id="today-timetable"></div>
      </div>

      <div class="card">
        <div class="card-label">DEADLINE</div>
        <div class="card-title">締切</div>
        <div id="today-upcoming"></div>
      </div>
    </div>

    <!-- ===== 進捗タブ ===== -->
    <div class="page" id="page-progress">
      <div class="card">
        <div class="card-label">SEMESTER</div>
        <div class="card-title">学期別進捗</div>
        <div id="semester-progress-selector" class="filter-row"></div>
      </div>
      <div id="progress-subject-list"></div>
    </div>

    <!-- ===== バッジタブ ===== -->
    <div class="page" id="page-badges">
      <div class="card">
        <div class="card-label">BADGES</div>
        <div class="card-title">オープンバッジ</div>
        <div id="badge-summary"></div>
      </div>
      <div id="badge-list-container"></div>
    </div>

    <!-- ===== 予定タブ（週/月） ===== -->
    <div class="page" id="page-schedule">
      <div class="card">
        <div class="card-label">SCHEDULE</div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <div class="card-title" style="margin-bottom:0">スケジュール</div>
          <div style="display:flex;gap:6px">
            <button id="schedule-view-week" class="filter-btn f-all active" onclick="scheduleView='week';renderSchedulePage()">週</button>
            <button id="schedule-view-month" class="filter-btn f-all" onclick="scheduleView='month';renderSchedulePage()">月</button>
          </div>
        </div>
        <div id="schedule-month-nav" style="display:none;align-items:center;justify-content:space-between;margin-bottom:12px">
          <button onclick="scheduleMonthOffset--;renderSchedulePage()" style="background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:4px 12px;border-radius:6px;cursor:pointer;font-size:16px">‹</button>
          <span id="schedule-month-label" style="font-size:14px;font-weight:700"></span>
          <button onclick="scheduleMonthOffset++;renderSchedulePage()" style="background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:4px 12px;border-radius:6px;cursor:pointer;font-size:16px">›</button>
        </div>
        <div id="schedule-week"></div>
        <div id="schedule-month" style="display:none"></div>
      </div>
    </div>

    <!-- ===== 設定タブ ===== -->
    <div class="page" id="page-settings">
      <div class="semester-tabs" id="semester-tabs"></div>
      <div class="card" id="graduation-checker">
        <div class="card-label">GRADUATION</div>
        <div class="card-title">卒業単位チェッカー</div>
        <div id="graduation-content"></div>
      </div>
      <div class="card" id="subject-selection-area">
        <div class="card-label">ENROLLMENT</div>
        <div class="card-title">履修科目を選択</div>
        <div id="subject-filters" class="filter-row"></div>
        <div id="subject-list"></div>
      </div>
      <div class="card" id="open-date-card">
        <div class="card-label">SCHEDULE</div>
        <div class="card-title">科目開講日一覧</div>
        <div id="open-date-list"></div>
      </div>
      <div class="card" id="enrolled-summary">
        <div class="card-label">SELECTED</div>
        <div class="card-title">選択中の科目</div>
        <div id="enrolled-list"></div>
        <div id="enrolled-stats" class="enrolled-stats"></div>
      </div>
    </div>

  </main>

  <nav class="nav">
    <button class="nav-btn active" data-page="today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      今日
    </button>
    <button class="nav-btn" data-page="schedule">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
      予定
    </button>
    <button class="nav-btn" data-page="progress">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      進捗
    </button>
    <button class="nav-btn" data-page="badges">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>
      バッジ
    </button>
  </nav>

  <script src="./data.js"></script>
  <script src="./attendance.js"></script>
  <script src="./render-today.js"></script>
  <script src="./render-today-timetable.js"></script>
  <script src="./render-today-cards.js"></script>
  <script src="./render-settings.js"></script>
  <script src="./render-schedule.js"></script>
  <script src="./render-badges.js"></script>
  <script src="./render-progress.js"></script>
  <script src="./render-deadlines.js"></script>
  <script src="./app.js"></script>
</body>
</html>
