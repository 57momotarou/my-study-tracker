<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>初期設定 - 大学進捗トラッカー</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f3f4f6;
      padding: 24px 16px;
      color: #1f2937;
    }
    h1 { font-size: 20px; margin-bottom: 6px; }
    p { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .card h2 { font-size: 15px; margin-bottom: 12px; }
    #qrcode {
      display: flex;
      justify-content: center;
      margin: 16px 0;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      margin-top: 12px;
    }
    .btn:hover { background: #1d4ed8; }
    .url-box {
      background: #f3f4f6;
      border-radius: 8px;
      padding: 10px;
      font-size: 11px;
      word-break: break-all;
      color: #6b7280;
      margin-top: 8px;
      max-height: 80px;
      overflow-y: auto;
    }
    .step {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 10px;
      font-size: 13px;
    }
    .step-num {
      background: #2563eb;
      color: white;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <h1>📱 iPhoneへデータ転送</h1>
  <p>このページはPCでのみ使用します。QRコードをiPhoneで読み取ってください。</p>

  <div class="card">
    <h2>📋 使い方</h2>
    <div class="step">
      <div class="step-num">1</div>
      <div>このページをPCのブラウザで開く</div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div>下のQRコードをiPhoneカメラで読み取る</div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div>iPhoneのSafariで自動的にデータが保存される</div>
    </div>
    <div class="step">
      <div class="step-num">4</div>
      <div>メインページに移動して科目が表示されればOK！</div>
    </div>
  </div>

  <div class="card">
    <h2>🔲 QRコード</h2>
    <div id="qrcode"></div>
    <div class="url-box" id="url-display">URLを生成中...</div>
    <button class="btn" onclick="regenerate()">🔄 QRコードを再生成</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script>
    // ========================================
    // 科目データ（schedule.jsの代わりにここに直接記載）
    // ========================================
    const SUBJECTS = [
      {
        id: 'it-basics',
        name: 'ITのための基礎知識',
        type: '専門',
        credits: 2,
        totalLessons: 15,
        chaptersPerLesson: 4,
        color: '#f59e0b',
        deadline: '2026-08-06'
      },
      {
        id: 'internet',
        name: 'インターネット入門',
        type: '専門',
        credits: 2,
        totalLessons: 15,
        chaptersPerLesson: 4,
        color: '#f59e0b',
        deadline: '2026-08-06'
      },
      {
        id: 'datascience',
        name: 'データサイエンス入門',
        type: '専門',
        credits: 2,
        totalLessons: 15,
        chaptersPerLesson: 4,
        color: '#f59e0b',
        deadline: '2026-08-06'
      },
      {
        id: 'office',
        name: 'オフィスソフトウェア基礎演習',
        type: '専門',
        credits: 2,
        totalLessons: 15,
        chaptersPerLesson: 4,
        color: '#f59e0b',
        deadline: '2026-08-06'
      },
      {
        id: 'project',
        name: 'プロジェクトマネジメント入門',
        type: '専門',
        credits: 2,
        totalLessons: 15,
        chaptersPerLesson: 4,
        color: '#f59e0b',
        deadline: '2026-08-06'
      },
      {
        id: 'study-skills',
        name: 'スタディスキル入門',
        type: '教養',
        credits: 1,
        totalLessons: 8,
        chaptersPerLesson: 4,
        color: '#10b981',
        deadline: '2026-06-02'
      },
      {
        id: 'ai',
        name: 'AI（人工知能）入門',
        type: '教養',
        credits: 1,
        totalLessons: 8,
        chaptersPerLesson: 4,
        color: '#10b981',
        deadline: '2026-06-16'
      },
      {
        id: 'psychology',
        name: '心理学入門',
        type: '教養',
        credits: 1,
        totalLessons: 8,
        chaptersPerLesson: 4,
        color: '#10b981',
        deadline: '2026-06-16'
      },
      {
        id: 'webdesign',
        name: 'Webデザイン入門',
        type: '教養',
        credits: 1,
        totalLessons: 8,
        chaptersPerLesson: 4,
        color: '#10b981',
        deadline: '2026-06-16'
      },
      {
        id: 'photo',
        name: '写真・映像制作の基礎',
        type: '教養',
        credits: 1,
        totalLessons: 8,
        chaptersPerLesson: 4,
        color: '#10b981',
        deadline: '2026-06-16'
      },
      {
        id: 'game',
        name: 'ゲームの歴史と未来',
        type: '教養',
        credits: 1,
        totalLessons: 8,
        chaptersPerLesson: 4,
        color: '#10b981',
        deadline: '2026-08-04'
      },
      {
        id: 'english',
        name: '基礎英語Ⅰ',
        type: '外国語',
        credits: 2,
        totalLessons: 15,
        chaptersPerLesson: 4,
        color: '#8b5cf6',
        deadline: '2026-08-04'
      }
    ];

    const WEEKLY_PLAN = [
      { day: 0, label: '日', subjects: [], isRest: true },
      { day: 1, label: '月', subjects: ['it-basics', 'study-skills'], slots: 2 },
      { day: 2, label: '火', subjects: ['internet', 'ai'], slots: 2 },
      { day: 3, label: '水', subjects: ['datascience', 'psychology'], slots: 2 },
      { day: 4, label: '木', subjects: ['english', 'office'], slots: 2 },
      { day: 5, label: '金', subjects: ['project', 'webdesign'], slots: 2 },
      { day: 6, label: '土', subjects: ['photo', 'game'], slots: 2 }
    ];

    // ========================================
    // QRコード生成
    // ========================================
    function generateURL() {
      const data = {
        subjects: SUBJECTS,
        weeklyPlan: WEEKLY_PLAN
      };
      const json = JSON.stringify(data);
      const encoded = btoa(unescape(encodeURIComponent(json)));
      const baseURL = 'https://57momotarou.github.io/benkyouganbaru/';
      return `${baseURL}?data=${encoded}`;
    }

    function regenerate() {
      const url = generateURL();
      document.getElementById('url-display').textContent = url;

      const qrDiv = document.getElementById('qrcode');
      qrDiv.innerHTML = '<canvas id="qr-canvas"></canvas>';

      QRCode.toCanvas(
        document.getElementById('qr-canvas'),
        url,
        { width: 220, margin: 2 },
        function(error) {
          if (error) console.error(error);
        }
      );
    }

    window.onload = () => regenerate();
  </script>
</body>
</html>
